inactive-opacity = 0.95;
active-opacity = 1.00;
backend = "glx";
use-damage = true;
vsync = true;
fading = true;
fade-in-step = 0.06;
fade-out-step = 0.06;

blur:
{
    method = "box";
    size = 7;
};

# semi-transparent
blur-background = true;

# Use fixed blur strength rather than adjusting according to window opacity
blur-background-fixed = true;

shadow = true;
shadow-radius = 20;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.9;
shadow-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g *= 'frame'",  # Tiled container
  # screenshot program
  "name *= 'maim'",
  "name *= 'slop'",
  "class_g *= 'slop'"
];
