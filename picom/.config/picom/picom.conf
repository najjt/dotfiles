inactive-opacity = 0.90;
active-opacity = 1.00;
backend = "glx";
use-damage = true;
vsync = true;
fading = true;
fade-in-step = 0.12;
fade-out-step = 0.12;

blur:
{
    method = "dual_kawase";
    size = 10;
    strength = 3;
};

# semi-transparent
blur-background = true

# blur-background-frame = true
# Use fixed blur strength rather than adjusting according to window opacity.
blur-background-fixed = true
