[colors]
background = #323520
background-alt = #cececE
foreground = #cecece
foreground-alt = #1e1e1e
primary = #cecece
secondary = #8abeb7
red = #a54242
grey = #707880

[bar/bar1]
width = 100%
height = 15pt
bottom = true

background = ${colors.background}
foreground = ${colors.foreground}

border-top-size = 3
border-top-color = #535835

padding-left = 0
padding-right = 2
module-margin = 2

separator = |
separator-foreground = ${colors.grey}

font-0 = "UnifontExMono:size=12;3"

modules-left = xworkspaces i3
modules-right = caffeinate mpd cpu battery date tray

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/tray]
type = internal/tray
tray-spacing = 12px
tray-padding = 2px
tray-size = 50%:15pt

[module/mpd]
type = internal/mpd
host = 127.0.0.1
port = 6600

[module/i3]
type = internal/i3
format = <label-mode>

[module/xworkspaces]
type = internal/xworkspaces

label-active = [ %name% ]
label-active-margin = 1

label-occupied = %name%
label-occupied-margin = 1
label-occupied-foreground = ${colors.grey}

label-empty = %name%
label-empty-margin = 1
label-empty-foreground = ${colors.grey}

label-urgent = %name%
label-urgent-margin = 1
label-urgent-foreground = ${colors.red}

[module/battery]
type = internal/battery
low-at = 40
full-at = 95
battery = BAT0
adapter = AC
time-format = %H:%M

format-charging = <label-charging>
format-low = <label-low>

label-full = BAT full
label-charging = BAT %percentage%% [CHR]
label-discharging = BAT %percentage%% %time%
label-low = BAT %{F#A54242}%percentage%%%{F-} %time%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
label = %percentage:3%%

[module/date]
type = internal/date
interval = 1
date = %a %d %b %R
format = <label>
label = %date%
label-foreground = ${colors.primary}

; show whether caffeinate (keep system from suspending) is running
[module/caffeinate]
type = custom/script
exec = ~/scripts/check_caffeinate
interval = 2

[settings]
screenchange-reload = true
