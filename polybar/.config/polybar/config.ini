[colors]
background = #1E1E1E
background-alt = #CECECE
foreground = #CECECE
foreground-alt = #1E1E1E
primary = #CECECE
secondary = #8ABEB7
alert = #A54242
faded = #707880

[bar/bar1]
width = 100%
height = 17pt
bottom = true

background = ${colors.background}
foreground = ${colors.foreground}

border-top-size = 2
border-top-color = ${colors.foreground}

padding-left = 0
padding-right = 1
module-margin = 1

separator = |
separator-foreground = ${colors.faded}
separator-font = 2

font-0 = "Unifont:size=12;4"
font-1 = "NotoSans Nerd Font:size=12;4"

modules-left = xworkspaces i3 xwindow
modules-right = now-playing xkeyboard pulseaudio memory cpu battery date

tray-position = right
tray-padding = 2
tray-scale = 1.2

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/now-playing]
type = custom/script
tail = true
format = <label>
exec = ~/.config/polybar/scripts/polybar-now-playing
click-right = "kill -USR1 $(pgrep --oldest --parent %pid%)"

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume>  <label-volume>

label-muted =   %{F#f00}muted

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 

[module/i3]
type = internal/i3
format = <label-mode>

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-foreground = ${colors.foreground-alt}
label-active-padding = 2

label-occupied = %name%
label-occupied-padding = 2

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/battery]
type = internal/battery
low-at = 30
full-at = 99
battery = BAT0
adapter = AC
time-format = %H:%M

format-charging = <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-low = <ramp-capacity> <label-low>

label-full = full
label-charging = 󰂄 %percentage%%
label-discharging = %percentage%% %time%
label-low = %percentage%% %time%
label-low-foreground = ${colors.alert}

ramp-capacity-0 = 󰂎
ramp-capacity-1 = 󱊡
ramp-capacity-2 = 󱊢
ramp-capacity-3 = 󱊣
ramp-capacity-4 = 󱊣

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/date]
type = internal/date
interval = 1
date = %A %d/%m/%y %R
label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
