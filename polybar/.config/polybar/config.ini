[colors]
background = #1E1E1E
background-alt = #CECECE
foreground = #CECECE
foreground-alt = #1E1E1E
primary = #CECECE
secondary = #8ABEB7
red = #A54242
grey = #707880

[bar/bar1]
width = 100%
height = 15pt
bottom = true

background = ${colors.background}
foreground = ${colors.foreground}

padding-left = 0
padding-right = 1
module-margin = 1

separator = |
separator-foreground = ${colors.grey}

font-0 = "UnifontExMono:size=12;4"
font-1 = "Symbols Nerd Font Mono:size=9;4"

modules-left = xworkspaces i3 xwindow
modules-right = now-playing xkeyboard cpu battery date

tray-position = right
tray-padding = 2
tray-scale = 1.2

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/now-playing]
type = custom/script
tail = true
format = <label>
exec = ~/.config/polybar/scripts/polybar-now-playing
click-right = "kill -USR1 $(pgrep --oldest --parent %pid%)"

[module/pulseaudio]
type = internal/pulseaudio

format-volume = VOL <label-volume>

label-muted = VOL %{F#f00}mute

label-volume = %percentage:3%%

click-right = pavucontrol

[module/i3]
type = internal/i3
format = <label-mode>

[module/xworkspaces]
type = internal/xworkspaces

label-active = [ %name% ]
label-active-margin = 1

label-occupied = %name%
label-occupied-margin = 1
label-occupied-foreground = ${colors.grey}

label-empty = %name%
label-empty-margin = 1
label-empty-foreground = ${colors.grey}

label-urgent = %name%
label-urgent-margin = 1
label-urgent-foreground = ${colors.red}

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "MEM "
label = %percentage_used:3%%

[module/battery]
type = internal/battery
low-at = 40
full-at = 99
battery = BAT0
adapter = AC
time-format = %H:%M

format-charging = <label-charging>
format-low-foreground = #f00

label-full = BAT full
label-charging = BAT %percentage%% [CHR]
label-discharging = BAT %percentage%% %time%
label-low = BAT %percentage%% %time%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
label = %percentage:3%%

[module/date]
type = internal/date
interval = 1
date = %a %d %b %R
format = <label> %{F#707880}|
label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
