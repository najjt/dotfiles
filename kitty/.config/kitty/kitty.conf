# Open scrollback in emacs
map f1 launch --stdin-source=@screen_scrollback --stdin-add-formatting --type=overlay /home/najjt/scripts/emacs_pager

# Font
font_family Liberation Mono
font_size 12.0

# Tab bar
tab_bar_edge top
tab_bar_style       custom
tab_separator       ""
tab_title_template  " {index} {title} "

shell_integration no-cursor
cursor_shape block
cursor_blink_interval 0

background_opacity 0.9

background #1e1e1e
